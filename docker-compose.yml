services:
  bot:
    build: .
    image: mx-autoinvoice:latest
    container_name: mx-autoinvoice-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./storage:/app/storage
      - ./vendors:/app/vendors
    # Link to external DB or use host network if DB is on host
    # network_mode: "host"
